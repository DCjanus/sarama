name: Consumer Redispatch Shutdown Repro

on:
  pull_request:
    branches:
    - "**"
    paths-ignore:
    - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  redispatch-shutdown:
    name: AsyncClose after broker redispatch
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
    - name: Run redispatch shutdown repro
      run: go test ./... -run '^TestPartitionConsumerAsyncCloseAfterBrokerAbandonsForRedispatch$' -count=1
